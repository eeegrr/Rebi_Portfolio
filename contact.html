<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--=============== FAVICON ===============-->
    <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">

    <!--=============== REMIXICONS ===============-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="assets/css/styles.css">

    <link rel="shortcut icon" href="assets/img/web-logo.png" type="x-icon" />
    <title>Forgach Rebeka - Portfolio</title>
</head>

<body class="page-contact">
    <!--==================== HEADER ====================-->
    <header class="header" id="header">
        <nav class="nav container">
            <a href="index.html" class="nav-logo">
                <span class="logo-drop">
                    <img src="assets/img/logo.png" />
                </span>
            </a>

            <div class="nav-menu" id="nav-menu">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link">Portfolio</a>
                    </li>
                    <li class="nav-item">
                        <a href="about.html" class="nav-link">About</a>
                    </li>
                    <li class="nav-item">
                        <a href="contact.html" class="nav-link active-link">Contact</a>
                    </li>
                </ul>

                <!-- Close button -->
                <div class="nav-close" id="nav-close">
                    <i class="ri-close-line"></i>
                </div>
            </div>

            <div class="nav-actions">
                <div class="nav-toggle" id="nav-toggle">
                    <i class="ri-menu-line"></i>
                </div>
            </div>
        </nav>
    </header>

    <!--==================== MAIN ====================-->
    <main class="main">
        <!--==================== CONTACT ====================-->
        <section class="contact section">
            <div class="contact-top">
                <h2 class="section-title"><span>REACH OUT!</span></h2>
                <p class="contact-description">Let’s make something together</p>
            </div>

            <div class="contact-container container">

                <div class="direct-contact-container">

                    <ul class="contact-list">
                        <li class="list-item">
                            <img src="assets/img/phone-icon.png" alt="Phone" class="icon">
                            <span class="contact-text phone">+36 30 480 7490</span>
                        </li>

                        <li class="list-item">
                            <img src="assets/img/email-icon.png" alt="Email" class="icon">
                            <span class="contact-text gmail">rebibab@gmail.com</span>
                        </li>
                    </ul>

                    <hr>

                    <div class="contact-social">
                        <a href="https://www.instagram.com/rebibab_the_great/" class="footer-social-link icon-instagram"
                            aria-label="Instagram"></a>
                        <a href="https://www.facebook.com/rebibab.the.great" class="footer-social-link icon-facebook"
                            aria-label="Facebook"></a>
                        <a href="https://www.linkedin.com/in/rebeka-forgach-78a1b1234/"
                            class="footer-social-link icon-linkedin" aria-label="LinkedIn"></a>
                    </div>

                    <hr>

                </div>

            </div>
        </section>
    </main>

    <!--========== SCROLL UP ==========-->
    <a href="" class="scrollup" id="scroll-up">
        <i class="ri-arrow-up-line"></i>
    </a>

    <!--=============== MAIN JS ===============-->
    <script src="assets/js/main.js"></script>
    <script src="https://smtpjs.com/v3/smtp.js"></script>
</body>

</html>
